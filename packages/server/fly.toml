# fly.toml app configuration file generated for sphere-coop-server on 2026-02-28T19:24:09-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sphere-coop-server'
primary_region = 'iad'

[build]
  dockerfile = "packages/server/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
